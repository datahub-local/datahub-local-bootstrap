---
kubernetes_reflector_helm_values: {}

kubernetes_reloader_helm_values: {}

argocd_enabled: false
argocd_namespaces:
  - default
argocd_helm_secrets:
  security.yaml: |
    security_github_client_id: "{{ security_github_client_id }}"
    security_github_client_secret: "{{ security_github_client_secret }}"
    security_github_organizations: "{{ security_github_organizations }}"
  extra-secrets.yaml: "{{ argocd_extra_secrets | to_nice_yaml }}"
argocd_helm_values:
  # custom values from https://github.com/argoproj/argo-helm/blob/main/charts/argo-cd/values.yaml
  global:
    domain: "automation-argo-cd.{{ gateway_hostname }}"
    logging:
      level: "info"
  configs:
    params:
      application.namespaces: "{{ argocd_namespaces | join(', ') }}"
      dexserver.disable.tls: true
      server.disable.auth: "{{ not (security_enabled | lower == 'true') }}"
      server.insecure: true
    cm:
      admin.enabled: "{{ not (security_enabled | lower == 'true') }}"
      exec.enabled: true
      users.anonymous.enabled: "{{ not (security_enabled | lower == 'true') }}"
      url: "https://automation-argo-cd.{{ gateway_hostname }}"
      resource.exclusions: |
        - apiGroups:
          - "velero.io"
          kinds:
          - "Backup"
          clusters:
          - "*"
      dex.config: |
        connectors:
          - type: oidc
            id: oidc
            name: IAM
            config:
              issuer: https://security-dex.{{ gateway_hostname }}/dex
              clientID: argo-cd
              clientSecret: $security_github_client_secret
      resource.customizations: |
        networking.k8s.io/Ingress:
          health.lua: |
            hs = {}
            
            if obj.status ~= nil then
              hs.status = "Healthy"
              hs.message = "Ingress created"
              return hs
            end

            hs.status = "Progressing"
            hs.message = "Waiting for creation"
            return hs
        sparkoperator.k8s.io/SparkApplication:
          health.lua: |
            hs = {}

            if obj.spec ~= nil and obj.spec.suspend == true then
              hs.status = "Healthy"
              hs.message = "SparkApplication suspended"
              return hs
            end

            if obj.status ~= nil and obj.status.applicationState ~= nil and obj.status.applicationState.state ~= nil then
              state = obj.status.applicationState.state

              if state == "RUNNING" or state == "COMPLETED" or state == "SUCCEEDING" or state == "SUSPENDED" then
                hs.status = "Healthy"
                hs.message = "SparkApplication state: " .. state
                return hs
              end

              if state == "FAILED" or state == "SUBMISSION_FAILED" or state == "FAILING" then
                hs.status = "Degraded"
                hs.message = obj.status.applicationState.errorMessage or ("SparkApplication state: " .. state)
                return hs
              end

              hs.status = "Progressing"
              hs.message = "SparkApplication state: " .. state
              return hs
            end

            hs.status = "Progressing"
            hs.message = "Waiting for SparkApplication status"
            return hs
        sparkoperator.k8s.io/ScheduledSparkApplication:
          health.lua: |
            hs = {}

            if obj.spec ~= nil and obj.spec.suspend == true then
              hs.status = "Healthy"
              hs.message = "ScheduledSparkApplication suspended"
              return hs
            end

            if obj.status ~= nil and obj.status.scheduleState ~= nil then
              state = obj.status.scheduleState

              if state == "Scheduled" then
                hs.status = "Healthy"
                hs.message = "ScheduledSparkApplication scheduled"
                return hs
              end

              if state == "FailedValidation" then
                hs.status = "Degraded"
                hs.message = obj.status.reason or "ScheduledSparkApplication validation failed"
                return hs
              end

              hs.status = "Progressing"
              hs.message = "ScheduledSparkApplication state: " .. state
              return hs
            end

            hs.status = "Progressing"
            hs.message = "Waiting for ScheduledSparkApplication status"
            return hs
    cmp:
      create: true
      plugins:
        helmfile:
          allowConcurrency: true
          discover:
            fileName: "helmfile.yaml*"
          generate:
            command:
              - bash
              - /helmfile-scripts/argo-cd-helmfile.sh

          lockRepo: false
    rbac:
      policy.default: "role:admin"

    credentialTemplates: "{{argocd_credential_templates}}"

    secret:
      extra:
        security_github_client_id: "{{ security_github_client_id }}"
        security_github_client_secret: "{{ security_github_client_secret }}"
        security_github_organizations: "{{ security_github_organizations }}"
  applicationSet:
    metrics:
      enabled: "{{ enable_service_monitors }}"
      serviceMonitor:
        enabled: "{{ enable_service_monitors }}"
  controller:
    metrics:
      enabled: "{{ enable_service_monitors }}"
      serviceMonitor:
        enabled: "{{ enable_service_monitors }}"
  dex:
    enable: "{{ security_enabled }}"
    livenessProbe:
      enabled: true
    readinessProbe:
      enabled: true
    metrics:
      enabled: "{{ enable_service_monitors }}"
      serviceMonitor:
        enabled: "{{ enable_service_monitors }}"
  repoServer:
    clusterRoleRules:
      enabled: true
    metrics:
      enabled: "{{ enable_service_monitors }}"
      serviceMonitor:
        enabled: "{{ enable_service_monitors }}"
    extraArgs:
      - --loglevel=debug
    extraContainers:
      - name: helmfile
        image: ghcr.io/helmfile/helmfile:v1.2.3
        command: ["/var/run/argocd/argocd-cmp-server"]
        env:
          - name: HELM_CACHE_HOME
            value: /tmp/helm/cache
          - name: HELM_CONFIG_HOME
            value: /tmp/helm/config
          - name: HELMFILE_CACHE_HOME
            value: /tmp/helmfile/cache
          - name: HELMFILE_TEMPDIR
            value: /tmp/helmfile/tmp
        securityContext:
          runAsNonRoot: true
          runAsUser: 999
        volumeMounts:
          - mountPath: /var/run/argocd
            name: var-files
          - mountPath: /home/argocd/cmp-server/plugins
            name: plugins
          - mountPath: /home/argocd/cmp-server/config/plugin.yaml
            subPath: helmfile.yaml
            name: argocd-cmp-cm
          - mountPath: /tmp
            name: helmfile-tmp
          - name: helmfile-scripts
            mountPath: /helmfile-scripts/
          - name: helm-values
            mountPath: /helm-values/
    volumeMounts:
      - name: helm-values
        mountPath: /helm-values/
    volumes:
      - name: argocd-cmp-cm
        configMap:
          name: argocd-cmp-cm
      - name: helmfile-scripts
        configMap:
          name: argocd-helmfile
      - name: helmfile-tmp
        emptyDir: {}
      - name: helm-values
        secret:
          secretName: argocd-helm-values
          optional: true
  server:
    metrics:
      enabled: "{{ enable_service_monitors }}"
      serviceMonitor:
        enabled: "{{ enable_service_monitors }}"
  extraObjects:
    - apiVersion: traefik.io/v1alpha1
      kind: IngressRoute
      metadata:
        name: argo-cd-argocd-server
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: "Argo CD"
          gethomepage.dev/pod-selector: "app.kubernetes.io/name=argocd-server"
          gethomepage.dev/group: "Automation"
          gethomepage.dev/icon: "sh-argo-cd"
          gethomepage.dev/href: "https://automation-argo-cd.{{ gateway_hostname }}"
      spec:
        entryPoints:
          - websecure
        routes:
          - match: Host(`automation-argo-cd.{{ gateway_hostname }}`)
            kind: Rule
            services:
              - name: argo-cd-argocd-server
                port: http
        tls:
          secretName: "{{ gateway_hostname }}-cert"
    - apiVersion: v1
      kind: Secret
      metadata:
        name: argocd-helm-values
      stringData: "{{ argocd_helm_secrets }}"
    - apiVersion: v1
      kind: ConfigMap
      metadata:
        name: argocd-helmfile
      data:
        argo-cd-helmfile.sh: |
          PARAMS=()                

          if [[ -v ARGOCD_APP_NAMESPACE ]]; then
            PARAMS+=(-n $ARGOCD_APP_NAMESPACE)
          fi

          if [[ -v ENV_NAME ]]; then
            PARAMS+=(-e $ENV_NAME)
          elif [[ -v ARGOCD_ENV_ENV_NAME ]]; then
            PARAMS+=(-e $ARGOCD_ENV_ENV_NAME)
          fi

          PREFIX_FILE="/tmp/helmfile_${ARGOCD_APP_NAME}_$(date +'%Y%m%d%H%M')"
          LOG_FILE="${PREFIX_FILE}.log"
          YAML_FILE="${PREFIX_FILE}.yaml"

          echo "##########################################" >> "$LOG_FILE"
          echo "1. Execute helmfile update for $ARGOCD_APP_NAME" >> "$LOG_FILE"
          echo "##########################################" >> "$LOG_FILE"
          helmfile "${PARAMS[@]}" deps >> "$LOG_FILE" 2>&1 || exit 1

          echo "##########################################" >> "$LOG_FILE"
          echo "2. Execute helmfile template for $ARGOCD_APP_NAME" >> "$LOG_FILE"
          echo "##########################################" >> "$LOG_FILE"

          PARAMS+=(template --include-crds -q)

          if [[ -v ARGOCD_APP_NAMESPACE ]]; then
            PARAMS+=(-n $ARGOCD_APP_NAMESPACE)
          fi

          for f in $(ls /helm-values/); do
            PARAMS+=(--state-values-file /helm-values/$f)
          done

          helmfile "${PARAMS[@]}" 2>> "$LOG_FILE" > "$YAML_FILE" && cat "$YAML_FILE" || exit 1

k8s_device_plugin_enabled: false
k8s_device_plugin_helm_values:
  runtimeClassName: nvidia
